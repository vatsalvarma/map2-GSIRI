<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link rel="stylesheet" href="https://use.typekit.net/oov2wcw.css" />
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Sofia" />
  <title>OPEN_PLOTS</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="responsive.css" />

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <style>
    .plot-size-row {
      align-items: flex-start;
    }

    .plot-diagram {
      position: relative;
      width: 50px;
      height: 50px;
      /* margin-top: 10px; */
      /* margin-bottom: 10px; */
      left: 20em;
      bottom: 8em;
    }

    .plot-box {
      width: 100%;
      height: 100%;
      border: 2px solid #5b5a2f;
      border-radius: 6px;
    }

    .plot-label {
      position: absolute;
      color: #5b5a2f;
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
    }

    .labell {
      font-size: 14px;
      letter-spacing: 2px;
      position: relative;
      margin-top: 10%;
    }

    /* Positioning */
    .north {
      top: -30px;
      left: 50%;
      transform: translateX(-50%);
    }

    .south {
      bottom: -30px;
      left: 50%;
      transform: translateX(-50%);
    }

    .west {
      left: -55px;
      top: 50%;
      transform: translateY(-50%);
      text-align: right;
    }

    .east {
      right: -55px;
      top: 50%;
      transform: translateY(-50%);
      text-align: left;
    }
  </style>
</head>

<body>
  <div class="firsttop">
    <div class="image-container">
      <img src="images/avalability tool ui.jpg" id="layout-image" alt="Layout" />

      <svg id="svg-map"></svg>
    </div>

    <div id="plot-info-panel" class="plot-info-panel">
      <div class="panel-header">
        <h3>PLOT DETAILS</h3>
      </div>
      <span class="line"></span>
      <div class="panel-row">
        <span class="label">PLOT NUMBER</span>
        <span class="value info-plot-number" id="info-plot-number">—</span>
      </div>
      <span class="line"></span>
      <div class="panel-row">
        <span class="label">PLOT AREA</span>

        <span class="value info-area" id="info-area">—</span>
      </div>
      <span class="line"></span>
      <div class="panel-row">
        <span class="label">PLOT ORIENTATION</span>

        <span class="value info-facing" id="info-facing">—</span>
      </div>
      <span class="line"></span>

      <div class="panel-row">
        <span class="label">PLOT TYPE</span>
        <span class="value info-type" id="info-type">—</span>
      </div>
      <div class="plot-diagram panel-row plot-size-row info-sizes" id="info-sizes"></div>

      <button id="add-compare-btn" class="compare-btn">
        Add to Compare (
        <span id="compare-count">0</span>
        )
      </button>
    </div>
    <button id="view-compare-btn" class="view-compare-btn" disabled>View Compared Plots</button>

    <!-- filter options -->
    <!-- =========================
     FILTER MODAL
     ========================= -->
    <button id="filter-btn" class="filter-btn">Filter</button>
    <div id="filter-modal">
      <div class="filter-overlay"></div>

      <div class="filter-dialog">
        <!-- FILTER CONTENT -->
        <div class="filter-header">
          <h3>Filter Plots</h3>
          <button id="close-filter">✕</button>
        </div>

        <div class="filter-body">
          <!-- Facing -->
          <div class="filter-group">
            <label>Facing</label>
            <select id="filter-facing">
              <option value="">All</option>
              <option value="east">east</option>
              <option value="west">west</option>
              <option value="north">north</option>
              <option value="south">south</option>
              <option value="northwest">northwest</option>
              <option value="northeast">northeast</option>
              <option value="southwest">southwest</option>
              <option value="southeast">southeast</option>
            </select>
          </div>

          <!-- Type -->
          <div class="filter-group">
            <label>PLC Type</label>
            <select id="filter-type">
              <option value="">All</option>
              <option value="normal">Normal</option>
              <option value="corner">Corner</option>
              <option value="waterstream">Water Stream</option>
              <option value="corner waterstream">Corner Water Stream</option>
              <option value="special_package">Special Package</option>
            </select>
          </div>

          <!-- Amenities -->
          <div class="filter-group">
            <label>Amenities</label>
            <select id="filter-amenities">
              <option value="">All</option>
              <option value="park">Park</option>
              <option value="clubhouse">Clubhouse</option>
              <option value="school">School</option>
            </select>
          </div>

          <!-- Size -->
          <!-- <div class="filter-group">
              <label>Plot Size (sqft)</label>
              <input type="range" id="filter-size" min="500" max="5000" step="100" value="5000" />
              <div id="size-value">Up to 5000 sqft</div>
            </div> -->
        </div>

        <div class="filter-footer">
          <button id="reset-filter">Reset</button>
          <button id="apply-filter">Apply</button>
        </div>
      </div>
    </div>

    <!-- MOBILE INFO SLOT -->
    <div id="mobile-info-slot">
      <div id="plot-info-panel" class="plot-info-panel">
        <div class="panel-header">
          <h3>PLOT DETAILS</h3>
        </div>

        <div class="panel-row">
          <span class="label">PLOT NUMBER</span>
          <span class="line"></span>
          <span class="value info-plot-number" id="mobile-info-plot-number">—</span>
        </div>

        <div class="panel-row">
          <span class="label">PLOT SIZES</span>
          <span class="line"></span>
          <span class="value info-sizes" id="mobile-info-sizes">—</span>
        </div>

        <div class="panel-row">
          <span class="label">PLOT AREA</span>
          <span class="line"></span>
          <span class="value info-area" id="mobile-info-area">—</span>
        </div>

        <div class="panel-row">
          <span class="label">PLOT ORIENTATION</span>
          <span class="line"></span>
          <span class="value info-facing" id="mobile-info-facing">—</span>
        </div>

        <div class="panel-row">
          <span class="label">PLOT TYPE</span>
          <span class="line"></span>
          <span class="value info-type" id="mobile-info-type">—</span>
        </div>


      </div>
    </div>
    <!-- =========================
     COMPARE MODAL
     ========================= -->
    <div id="compare-modal" class="compare-modal">
      <div class="compare-overlay"></div>

      <div class="compare-dialog">
        <div class="compare-header">
          <h3>Compare Plots</h3>
          <div style="display:flex;gap:10px;align-items:center">
            <button id="reset-compare" class="reset-compare-btn">Reset All</button>
            <button id="close-compare">✕</button>
          </div>
        </div>

        <div id="compare-content" class="compare-content">
          <!-- dynamic cards injected by JS -->
        </div>
      </div>
    </div>

    <div id="central-tooltip" class="central-tooltip"></div>

    <p id="center-line" class="center-line"></p>
    <!-- plot info card -->
    <div id="plot-hover-tooltip"></div>
  </div>
